name: ci

on:
  push:
  pull_request:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  python:
    name: Python quality and tests
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
        with:
          lfs: true
      - uses: actions/setup-python@v7
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: requirements-dev.lock
      - run: python -m pip install --upgrade pip
      - run: python -m pip install -r requirements-dev.lock
      - run: python -m pip install --no-deps -e .
      - run: python -m compileall -q src tests tools benchmarks
      - run: ruff check src tests tools benchmarks gunicorn_conf.py
      - run: pytest -q

  rust:
    name: Rust formatting, lint, and tests
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy,rustfmt
          targets: wasm32-unknown-unknown
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: .
      - run: cargo fmt --all -- --check
      - run: cargo clippy --workspace --all-targets --locked -- -D warnings
      - run: cargo test --workspace --all-targets --locked
      - run: cargo build --locked -p dhad-core --profile wasm-small --target wasm32-unknown-unknown

  web:
    name: JavaScript, PWA, and repository contracts
    runs-on: ubuntu-latest
    timeout-minutes: 20
    defaults:
      run:
        working-directory: web_demo
    steps:
      - uses: actions/checkout@v4
        with:
          lfs: true
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: web_demo/package-lock.json
      - uses: actions/setup-python@v7
        with:
          python-version: "3.12"
      - run: npm ci --ignore-scripts
      - run: npm run check
      - run: npm test
      - name: Audit complete repository and retained assets
        working-directory: .
        run: |
          python tools/audit_repository.py --write-reports
          python tools/validate_sovereign_release.py --root . --skip-cleanliness --strict
