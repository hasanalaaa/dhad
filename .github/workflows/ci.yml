name: ci

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

permissions:
  contents: read

env:
  PYTHONDONTWRITEBYTECODE: "1"
  PYTHONPATH: ".:src"

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  python:
    name: Python quality and tests
    runs-on: ubuntu-24.04
    timeout-minutes: 25
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0
          lfs: true
      - name: Materialize Git LFS assets
        run: |
          git lfs pull
          git lfs checkout
      - uses: actions/setup-python@v7
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: requirements-dev.lock
      - uses: actions/setup-node@v5
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: web_demo/package-lock.json
      - run: python -m pip install --upgrade pip
      - run: python -m pip install -r requirements-dev.lock
      - run: python -m pip install --no-deps -e .
      - name: Install Yjs runtime used by Python cross-runtime tests
        run: npm ci --prefix web_demo --ignore-scripts
      - run: python -m compileall -q src tests tools benchmarks
      - run: ruff check src tests tools benchmarks gunicorn_conf.py
      - run: pytest -q

  rust:
    name: Rust formatting, lint, and tests
    runs-on: ubuntu-24.04
    timeout-minutes: 25
    steps:
      - uses: actions/checkout@v5
      - name: Install Tauri Linux prerequisites
        run: |
          sudo apt-get update
          sudo apt-get install --no-install-recommends -y \
            libwebkit2gtk-4.1-dev \
            build-essential \
            curl \
            wget \
            file \
            libxdo-dev \
            libssl-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            patchelf
      - uses: dtolnay/rust-toolchain@1.97.1
        with:
          components: clippy,rustfmt
          targets: wasm32-unknown-unknown
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: .
      - run: cargo fmt --all -- --check
      - run: cargo clippy --workspace --all-targets -- -D warnings
      - run: cargo test --workspace --all-targets
      - run: cargo build -p dhad-core --profile wasm-small --target wasm32-unknown-unknown

  web:
    name: JavaScript, PWA, and repository contracts
    runs-on: ubuntu-24.04
    timeout-minutes: 20
    defaults:
      run:
        working-directory: web_demo
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0
          lfs: true
      - name: Materialize Git LFS assets
        working-directory: .
        run: |
          git lfs pull
          git lfs checkout
      - uses: actions/setup-node@v5
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: web_demo/package-lock.json
      - uses: actions/setup-python@v7
        with:
          python-version: "3.12"
      - run: npm ci --ignore-scripts
      - run: npm run check
      - run: npm test
      - name: Install repository audit requirements
        working-directory: .
        run: python -m pip install --disable-pip-version-check PyYAML==6.0.3
      - name: Audit complete repository
        working-directory: .
        run: python tools/audit_repository.py --write-reports
      - name: Validate retained release assets
        working-directory: .
        run: python tools/validate_sovereign_release.py --root . --skip-cleanliness --strict
