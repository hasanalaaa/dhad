name: Desktop Release

on:
  push:
    tags:
      - "v*.*.*"
  workflow_dispatch:
    inputs:
      tag:
        description: Existing semantic version tag to build, for example v1.0.15
        required: true
        type: string

permissions:
  contents: write

concurrency:
  group: desktop-release-${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.ref }}
  cancel-in-progress: false

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: "1"
  PYTHONDONTWRITEBYTECODE: "1"
  PYTHONPATH: ".:src"
  TAURI_CLI_VERSION: "2.11.4"
  RELEASE_TAG: ${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.ref_name }}

jobs:
  validate:
    name: Validate release contracts
    runs-on: ubuntu-24.04
    timeout-minutes: 45
    steps:
      - name: Checkout tagged source and LFS assets
        uses: actions/checkout@v5
        with:
          ref: ${{ env.RELEASE_TAG }}
          fetch-depth: 0
          lfs: true

      - name: Materialize Git LFS assets
        run: |
          git lfs pull
          git lfs checkout

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: web_demo/package-lock.json

      - name: Set up Python
        uses: actions/setup-python@v7
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: requirements-dev.lock

      - name: Install Linux desktop prerequisites
        run: |
          sudo apt-get update
          sudo apt-get install --no-install-recommends -y \
            libwebkit2gtk-4.1-dev \
            build-essential \
            curl \
            wget \
            file \
            libxdo-dev \
            libssl-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            patchelf

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@1.97.1
        with:
          components: clippy,rustfmt
          targets: wasm32-unknown-unknown

      - name: Cache Rust build outputs
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: .

      - name: Install pinned Tauri CLI
        run: |
          npm install --global @tauri-apps/cli@2.11.4
          tauri --version | grep -F "2.11.4"

      - name: Install locked Python test and build dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements-dev.lock
          python -m pip install --no-deps -e .

      - name: Install locked web dependencies
        run: npm ci --prefix web_demo --ignore-scripts

      - name: Validate release version matches tag
        run: python tools/validate_release_version.py --root . --tag "$RELEASE_TAG"

      - name: Stage dependency-free Tauri frontend and verify exact closure
        run: node tools/build_web_dist.mjs

      - name: Validate Tauri 2.11 configuration
        run: python tools/validate_tauri_config.py --config src-tauri/tauri.conf.json

      - name: Optimize and inventory ONNX assets
        run: python tools/optimize_onnx_assets.py --root . --write-manifest

      - name: Run release audits
        run: |
          python tools/validate_desktop_release.py --root . --strict --write-reports
          python tools/validate_sovereign_release.py --root . --skip-cleanliness --strict --write-report
          python tools/audit_repository.py

      - name: Test Python surface
        run: |
          python -m compileall -q src tests tools benchmarks
          ruff check src tests tools benchmarks gunicorn_conf.py
          pytest -q

      - name: Test JavaScript and PWA surface
        run: |
          npm run check --prefix web_demo
          npm test --prefix web_demo

      - name: Test locked Rust workspace and WASM target
        run: |
          cargo fmt --all -- --check
          cargo clippy --workspace --all-targets --locked -- -D warnings
          cargo test --workspace --all-targets --locked
          cargo build -p dhad-core --profile wasm-small --target wasm32-unknown-unknown --locked

  build:
    name: Build ${{ matrix.label }}
    needs: validate
    strategy:
      fail-fast: false
      matrix:
        include:
          - label: macOS Apple Silicon DMG
            platform: macos-15
            target: aarch64-apple-darwin
            args: --target aarch64-apple-darwin --bundles dmg
            verify_arch: aarch64
          - label: macOS Intel DMG
            platform: macos-15-intel
            target: x86_64-apple-darwin
            args: --target x86_64-apple-darwin --bundles dmg
            verify_arch: x86_64
          - label: Windows x64 NSIS and MSI
            platform: windows-2025
            target: x86_64-pc-windows-msvc
            args: --target x86_64-pc-windows-msvc --bundles nsis,msi
    runs-on: ${{ matrix.platform }}
    timeout-minutes: 100
    steps:
      - name: Checkout tagged source and LFS assets
        uses: actions/checkout@v5
        with:
          ref: ${{ env.RELEASE_TAG }}
          fetch-depth: 0
          lfs: true

      - name: Materialize Git LFS assets
        shell: bash
        run: |
          git lfs pull
          git lfs checkout

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: web_demo/package-lock.json

      - name: Set up Python
        uses: actions/setup-python@v7
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: tools/desktop-build-requirements.txt

      - name: Set up Rust target
        uses: dtolnay/rust-toolchain@1.97.1
        with:
          components: clippy,rustfmt
          targets: ${{ matrix.target }}

      - name: Cache Rust build outputs
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: .
          key: ${{ matrix.target }}

      - name: Install pinned Tauri CLI
        run: |
          npm install --global @tauri-apps/cli@2.11.4
          tauri --version | grep -F "2.11.4"

      - name: Install desktop build requirements
        run: python -m pip install --disable-pip-version-check -r tools/desktop-build-requirements.txt

      - name: Install locked web dependencies
        run: npm ci --prefix web_demo --ignore-scripts

      - name: Validate and prepare release assets
        run: |
          python tools/validate_release_version.py --root . --tag "$RELEASE_TAG"
          node tools/build_web_dist.mjs
          python tools/validate_tauri_config.py --config src-tauri/tauri.conf.json
          python tools/optimize_onnx_assets.py --root . --write-manifest
          python tools/validate_desktop_release.py --root . --strict
          python tools/validate_sovereign_release.py --root . --skip-cleanliness --strict
          npm run check --prefix web_demo
          npm test --prefix web_demo
          cargo fmt --all -- --check
          cargo clippy --workspace --all-targets --locked -- -D warnings
          cargo test --workspace --all-targets --locked

      - name: Configure optional Apple signing and notarization
        if: runner.os == 'macOS'
        shell: bash
        env:
          DHAD_APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
          DHAD_APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
          DHAD_APPLE_SIGNING_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY }}
          DHAD_APPLE_ID: ${{ secrets.APPLE_ID }}
          DHAD_APPLE_PASSWORD: ${{ secrets.APPLE_PASSWORD }}
          DHAD_APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        run: |
          set -euo pipefail
          write_env() {
            local name="$1" value="$2" delimiter="DHAD_$(date +%s%N)_$RANDOM"
            if [[ -n "$value" ]]; then
              {
                printf '%s<<%s\n' "$name" "$delimiter"
                printf '%s\n' "$value"
                printf '%s\n' "$delimiter"
              } >> "$GITHUB_ENV"
            fi
          }

          if [[ -n "$DHAD_APPLE_CERTIFICATE" || -n "$DHAD_APPLE_CERTIFICATE_PASSWORD" || -n "$DHAD_APPLE_SIGNING_IDENTITY" ]]; then
            [[ -n "$DHAD_APPLE_CERTIFICATE" && -n "$DHAD_APPLE_CERTIFICATE_PASSWORD" && -n "$DHAD_APPLE_SIGNING_IDENTITY" ]] || {
              echo "APPLE_CERTIFICATE, APPLE_CERTIFICATE_PASSWORD, and APPLE_SIGNING_IDENTITY must be configured together." >&2
              exit 1
            }
          fi
          if [[ -n "$DHAD_APPLE_ID" || -n "$DHAD_APPLE_PASSWORD" || -n "$DHAD_APPLE_TEAM_ID" ]]; then
            [[ -n "$DHAD_APPLE_ID" && -n "$DHAD_APPLE_PASSWORD" && -n "$DHAD_APPLE_TEAM_ID" ]] || {
              echo "APPLE_ID, APPLE_PASSWORD, and APPLE_TEAM_ID must be configured together." >&2
              exit 1
            }
          fi

          write_env APPLE_CERTIFICATE "$DHAD_APPLE_CERTIFICATE"
          write_env APPLE_CERTIFICATE_PASSWORD "$DHAD_APPLE_CERTIFICATE_PASSWORD"
          write_env APPLE_SIGNING_IDENTITY "$DHAD_APPLE_SIGNING_IDENTITY"
          write_env APPLE_ID "$DHAD_APPLE_ID"
          write_env APPLE_PASSWORD "$DHAD_APPLE_PASSWORD"
          write_env APPLE_TEAM_ID "$DHAD_APPLE_TEAM_ID"

      - name: Build and upload bundles to draft release
        uses: tauri-apps/tauri-action@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_CLI_VERSION: "2.11.4"
        with:
          tauriScript: tauri
          projectPath: src-tauri
          tagName: ${{ env.RELEASE_TAG }}
          releaseName: "ضاد ${{ env.RELEASE_TAG }}"
          releaseBody: |
            إصدار ضاد المكتبي لنظامي macOS وWindows.

            - macOS: Apple Silicon وIntel بصيغة DMG
            - Windows: NSIS setup EXE وMSI
            - المعالجة اللغوية محلية افتراضيًا
          releaseDraft: true
          prerelease: false
          generateReleaseNotes: true
          uploadUpdaterJson: false
          uploadUpdaterSignatures: false
          uploadWorkflowArtifacts: true
          retryAttempts: 2
          args: ${{ matrix.args }}

      - name: Verify signed macOS app bundle and native launch
        if: runner.os == 'macOS'
        env:
          DHAD_EXPECTED_MACOS_ARCH: ${{ matrix.verify_arch }}
          DHAD_SKIP_MACOS_LAUNCH_SMOKE: "0"
        run: ./scripts/verify-macos-app.sh

  publish:
    name: Verify assets and publish release atomically
    needs: build
    runs-on: ubuntu-24.04
    timeout-minutes: 10
    steps:
      - name: Verify complete installer set and publish draft
        uses: actions/github-script@v9
        env:
          RELEASE_TAG: ${{ env.RELEASE_TAG }}
        with:
          script: |
            const { owner, repo } = context.repo;
            const tag = process.env.RELEASE_TAG;
            const { data: release } = await github.rest.repos.getReleaseByTag({ owner, repo, tag });
            const names = release.assets.map((asset) => asset.name);
            const lower = names.map((name) => name.toLowerCase());
            const dmgCount = lower.filter((name) => name.endsWith('.dmg')).length;
            const hasMsi = lower.some((name) => name.endsWith('.msi'));
            const hasNsis = lower.some((name) => name.endsWith('.exe'));
            if (dmgCount < 2 || !hasMsi || !hasNsis) {
              core.setFailed(`Incomplete release assets for ${tag}: ${JSON.stringify(names)}`);
              return;
            }
            if (!release.draft) {
              core.setFailed(`Release ${tag} was published before the full matrix completed.`);
              return;
            }
            await github.rest.repos.updateRelease({
              owner,
              repo,
              release_id: release.id,
              draft: false,
              prerelease: false,
            });
            core.info(`Published ${tag} with ${names.length} assets: ${names.join(', ')}`);
